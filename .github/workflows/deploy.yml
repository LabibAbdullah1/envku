name: Hybrid Linux Build & FTP cPanel Deploy

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      skip_linux:
        description: 'Skip Linux Build (only deploy local website/downloads)'
        type: boolean
        required: false
        default: false

jobs:
  build-linux-and-deploy:
    name: Build Linux .deb and Sync to cPanel
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install System Dependencies for Tauri
        if: ${{ github.event.inputs.skip_linux != 'true' && github.event.inputs.skip_linux != true && !contains(github.event.head_commit.message, '[skip linux]') && !contains(github.event.head_commit.message, '[only windows]') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            fuse \
            libfuse2

      - name: Setup Node.js
        if: ${{ github.event.inputs.skip_linux != 'true' && github.event.inputs.skip_linux != true && !contains(github.event.head_commit.message, '[skip linux]') && !contains(github.event.head_commit.message, '[only windows]') }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust Toolchain
        if: ${{ github.event.inputs.skip_linux != 'true' && github.event.inputs.skip_linux != true && !contains(github.event.head_commit.message, '[skip linux]') && !contains(github.event.head_commit.message, '[only windows]') }}
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Dependencies (Rust Cache)
        if: ${{ github.event.inputs.skip_linux != 'true' && github.event.inputs.skip_linux != true && !contains(github.event.head_commit.message, '[skip linux]') && !contains(github.event.head_commit.message, '[only windows]') }}
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm Dependencies
        if: ${{ github.event.inputs.skip_linux != 'true' && github.event.inputs.skip_linux != true && !contains(github.event.head_commit.message, '[skip linux]') && !contains(github.event.head_commit.message, '[only windows]') }}
        run: npm ci

      - name: Build Tauri App (Linux AppImage & deb)
        if: ${{ github.event.inputs.skip_linux != 'true' && github.event.inputs.skip_linux != true && !contains(github.event.head_commit.message, '[skip linux]') && !contains(github.event.head_commit.message, '[only windows]') }}
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Process Linux Release (Post-Build Linux)
        if: ${{ github.event.inputs.skip_linux != 'true' && github.event.inputs.skip_linux != true && !contains(github.event.head_commit.message, '[skip linux]') && !contains(github.event.head_commit.message, '[only windows]') }}
        run: |
          node post-build-linux.cjs
          echo "Current list of files in website/downloads/:"
          ls -lh website/downloads/

      - name: FTP Deploy Website to cPanel
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/windows-linux'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          security: loose
          local-dir: ./website/
          server-dir: ./
          state-name: .ftp-deploy-sync-state.json