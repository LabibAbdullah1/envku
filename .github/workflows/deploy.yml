name: Hybrid Linux Build & FTP cPanel Deploy

on:
  push:
    branches:
      - '**' # Triggered when push occurs on any branch (to verify compilation)

jobs:
  build-linux-and-deploy:
    name: Build Linux .deb and Sync to cPanel
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            fuse \
            libfuse2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Dependencies (Rust Cache)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm Dependencies
        run: npm ci

      - name: Build Tauri App (Linux AppImage & deb)
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Process Linux Release (Post-Build Linux)
        run: |
          node post-build-linux.cjs
          echo "Current list of files in website/downloads/:"
          ls -lh website/downloads/

      - name: FTP Deploy Website to cPanel
        if: github.ref == 'refs/heads/main'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./website/
          server-dir: ./
          state-name: .ftp-deploy-sync-state.json